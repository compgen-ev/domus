<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenHistoricalMap OAuth Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      max-width: 520px;
      width: 100%;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #2c1a00;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ohm     { background: #7d4a00; color: #fff; }
    .btn-logout  { background: #e8e8e8; color: #333; font-size: 0.85rem; padding: 0.4rem 0.9rem; }
    .btn-test    { background: #1a7f37; color: #fff; }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      margin-bottom: 1.2rem;
    }
    .status.info    { background: #fdf3e3; color: #a05c00; }
    .status.success { background: #e6f4ea; color: #1e7e34; }
    .status.error   { background: #fce8e6; color: #c5221f; }

    .profile {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: #faf7f2;
      border-radius: 8px;
      margin-bottom: 1.2rem;
    }

    .profile img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
    }

    .profile-placeholder {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #7d4a00;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .profile-name { font-weight: 700; font-size: 1rem; color: #2c1a00; }
    .profile-meta { font-size: 0.8rem; color: #888; margin-top: 0.1rem; }

    details { margin-top: 1.2rem; }
    summary { font-size: 0.82rem; color: #7d4a00; cursor: pointer; user-select: none; }

    pre {
      margin-top: 0.6rem;
      padding: 0.8rem;
      background: #f5f0e8;
      border-radius: 6px;
      font-size: 0.76rem;
      overflow-x: auto;
      color: #333;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="card">
  <h1>OpenHistoricalMap OAuth 2.0 Test</h1>
  <p class="subtitle">
    PKCE flow · auth + data: openhistoricalmap.org
  </p>

  <div id="status-area"></div>
  <div id="profile-area"></div>
  <div id="action-area"></div>
  <div id="debug-area"></div>
</div>

<script type="module">
  // ── OAuth 2.0 PKCE ────────────────────────────────────────────────────────

  function base64urlEncode(buffer) {
    let binary = '';
    for (const b of buffer) binary += String.fromCharCode(b);
    return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  function randomBase64url(byteLength) {
    const buf = new Uint8Array(byteLength);
    crypto.getRandomValues(buf);
    return base64urlEncode(buf);
  }

  async function sha256Base64url(plain) {
    const data = new TextEncoder().encode(plain);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return base64urlEncode(new Uint8Array(digest));
  }

  function storageKey(clientId, suffix) {
    return `oauth_${clientId}_${suffix}`;
  }

  async function initiateLogin(config) {
    const verifier  = randomBase64url(32);
    const state     = randomBase64url(16);
    const challenge = await sha256Base64url(verifier);
    const redirectUri = config.redirectUri ?? `${location.origin}${location.pathname}`;

    sessionStorage.setItem(storageKey(config.clientId, 'verifier'), verifier);
    sessionStorage.setItem(storageKey(config.clientId, 'state'),    state);

    const params = new URLSearchParams({
      response_type:         'code',
      client_id:             config.clientId,
      redirect_uri:          redirectUri,
      scope:                 config.scopes.join(' '),
      state,
      code_challenge:        challenge,
      code_challenge_method: 'S256',
    });

    location.href = `${config.authEndpoint}?${params}`;
  }

  async function handleCallback(config) {
    const params = new URLSearchParams(location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    if (!code || !state) return null;

    const savedState   = sessionStorage.getItem(storageKey(config.clientId, 'state'));
    const codeVerifier = sessionStorage.getItem(storageKey(config.clientId, 'verifier'));
    if (!savedState || state !== savedState) throw new Error('State mismatch — possible CSRF attempt');

    sessionStorage.removeItem(storageKey(config.clientId, 'state'));
    sessionStorage.removeItem(storageKey(config.clientId, 'verifier'));
    history.replaceState(null, '', `${location.origin}${location.pathname}`);

    const redirectUri = config.redirectUri ?? `${location.origin}${location.pathname}`;
    const body = new URLSearchParams({
      grant_type:    'authorization_code',
      code,
      redirect_uri:  redirectUri,
      client_id:     config.clientId,
      code_verifier: codeVerifier ?? '',
    });

    const res  = await fetch(config.tokenEndpoint, {
      method:  'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body,
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error_description ?? data.error ?? `HTTP ${res.status}`);

    sessionStorage.setItem(storageKey(config.clientId, 'token'), data.access_token);
    return data;
  }

  function getStoredToken(clientId) {
    return sessionStorage.getItem(storageKey(clientId, 'token'));
  }

  function clearStoredToken(clientId) {
    sessionStorage.removeItem(storageKey(clientId, 'token'));
  }

  // ── Config ────────────────────────────────────────────────────────────────
  // Register at: https://www.openhistoricalmap.org/oauth2/applications/new
  //   Redirect URI:  <this page's URL>
  //   Scopes:        read_prefs, write_api
  //   Confidential:  No (public client)

  const CONFIG = {
    clientId:      'qWphSMfJpscsdafgzn-42QwNkJh16U9rpLbCY57_K-g',
    authEndpoint:  'https://www.openhistoricalmap.org/oauth2/authorize',
    tokenEndpoint: 'https://www.openhistoricalmap.org/oauth2/token',
    scopes:        ['read_prefs', 'write_api'],
  };

  const OHM_API = 'https://api.openhistoricalmap.org/api/0.6';

  // ── DOM helpers ───────────────────────────────────────────────────────────

  function setStatus(msg, type = 'info') {
    document.getElementById('status-area').innerHTML =
      `<div class="status ${type}">${msg}</div>`;
  }

  function clearStatus() {
    document.getElementById('status-area').innerHTML = '';
  }

  function setActionLogin() {
    document.getElementById('action-area').innerHTML =
      `<button id="login-btn" class="btn btn-ohm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Login with OpenHistoricalMap
      </button>`;
    document.getElementById('login-btn').addEventListener('click', () => {
      setActionLoading('Redirecting…');
      initiateLogin(CONFIG);
    });
  }

  function setActionLoading(label) {
    document.getElementById('action-area').innerHTML =
      `<button class="btn btn-ohm" disabled>
        <span class="spinner"></span>${label}
      </button>`;
  }

  function setActionLogout(username) {
    document.getElementById('action-area').innerHTML =
      `<div class="row" style="margin-bottom:0.75rem">
        <span style="font-size:0.85rem;color:#555">Logged in as <strong>${username}</strong></span>
        <button id="logout-btn" class="btn btn-logout">Log out</button>
      </div>
      <div class="row">
        <button id="test-edit-btn" class="btn btn-test">Test Changeset</button>
        <span style="font-size:0.8rem;color:#888">creates + closes an empty changeset on OHM</span>
      </div>`;
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('test-edit-btn').addEventListener('click', () => {
      smokeTestChangeset().catch(err => setStatus(`Changeset failed: ${err.message}`, 'error'));
    });
  }

  function showProfile(user, tokenData) {
    const name    = user?.display_name ?? '?';
    const initial = name[0].toUpperCase();
    const avatar  = user?.img?.href
      ? `<img src="${user.img.href}" alt="avatar">`
      : `<div class="profile-placeholder">${initial}</div>`;
    document.getElementById('profile-area').innerHTML =
      `<div class="profile">
        ${avatar}
        <div>
          <div class="profile-name">${name}</div>
          <div class="profile-meta">OHM id: ${user?.id ?? '—'}</div>
        </div>
      </div>`;
    if (tokenData) {
      const safe = JSON.stringify(tokenData, (key, v) =>
        key === 'access_token' ? v.slice(0, 12) + '…[truncated]' : v, 2);
      document.getElementById('debug-area').innerHTML =
        `<details><summary>Token response (access_token truncated)</summary><pre>${safe}</pre></details>`;
    }
  }

  // ── OHM profile fetch ─────────────────────────────────────────────────────

  async function loadProfile(token, tokenData) {
    setStatus('Fetching user details…', 'info');
    let user = {};
    try {
      const res = await fetch(`${OHM_API}/user/details.json`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.ok) {
        const body = await res.json();
        user = body.user ?? body;
      }
    } catch { /* non-fatal */ }

    clearStatus();
    setStatus('Logged in successfully.', 'success');
    showProfile(user, tokenData);
    setActionLogout(user?.display_name ?? 'Unknown');
  }

  // ── Logout ────────────────────────────────────────────────────────────────

  function logout() {
    clearStoredToken(CONFIG.clientId);
    document.getElementById('profile-area').innerHTML = '';
    document.getElementById('debug-area').innerHTML   = '';
    clearStatus();
    setActionLogin();
  }

  // ── Smoke test: create + immediately close an empty changeset ─────────────

  async function smokeTestChangeset() {
    const token = getStoredToken(CONFIG.clientId);

    setStatus('Creating changeset…', 'info');

    const createRes = await fetch(`${OHM_API}/changeset/create`, {
      method:  'PUT',
      headers: {
        Authorization:  `Bearer ${token}`,
        'Content-Type': 'application/xml',
      },
      body: `<osm>
  <changeset>
    <tag k="comment" v="OAuth smoke test"/>
    <tag k="created_by" v="domus"/>
  </changeset>
</osm>`,
    });

    if (!createRes.ok) {
      const text = await createRes.text();
      throw new Error(`Create changeset: HTTP ${createRes.status} — ${text}`);
    }

    const changesetId = (await createRes.text()).trim();
    setStatus(`Changeset ${changesetId} created. Closing…`, 'info');

    const closeRes = await fetch(`${OHM_API}/changeset/${changesetId}/close`, {
      method:  'PUT',
      headers: { Authorization: `Bearer ${token}` },
    });

    if (!closeRes.ok) {
      throw new Error(`Close changeset: HTTP ${closeRes.status}`);
    }

    setStatus(`Changeset ${changesetId} created and closed.`, 'success');
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  async function init() {
    const params = new URLSearchParams(location.search);
    const error  = params.get('error');

    if (error) {
      history.replaceState(null, '', location.pathname);
      setStatus(`Authorization denied: ${params.get('error_description') || error}`, 'error');
      setActionLogin();
      return;
    }

    try {
      const tokenData = await handleCallback(CONFIG);
      if (tokenData) {
        await loadProfile(tokenData.access_token, tokenData);
        return;
      }
    } catch (err) {
      setStatus(`Login failed: ${err.message}`, 'error');
      setActionLogin();
      return;
    }

    const stored = getStoredToken(CONFIG.clientId);
    if (stored) {
      await loadProfile(stored, null);
      return;
    }

    setActionLogin();
  }

  init();
</script>
</body>
</html>
